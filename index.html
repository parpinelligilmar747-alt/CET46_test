<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>四六级英语能力测评 · 个性化诊断报告</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&display=swap" rel="stylesheet" />
<style>
  /* ========== 设计系统 ========== */
  :root {
    --bg: #EFF5F1;
    --bg-paper: #F8FBF9;
    --surface: #FFFFFF;
    --ink: #1A2C26;
    --ink-2: #3B4F48;
    --ink-3: #6C7D76;
    --line: #DAE7E0;
    --line-strong: #B8D0C5;
    --accent: #0E8C6D;       /* 清新翡翠绿 */
    --accent-dark: #0A6E55;
    --gold: #EBA93C;         /* 暖琥珀（荧光笔高亮） */
    --forest: #16654F;
    --shadow-1: 0 1px 2px rgba(26,44,38,.04), 0 4px 16px rgba(26,44,38,.06);
    --shadow-2: 0 8px 32px rgba(26,44,38,.10);

    --font-serif: "Noto Serif SC", "Songti SC", "STSong", serif;
    --font-sans: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    --font-display: "Fraunces", "Noto Serif SC", serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--ink);
    line-height: 1.75;
    font-size: 16px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(14,140,109,.05), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(22,101,79,.05), transparent 50%);
  }

  /* 纸张纹理 */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
    opacity: .035;
    mix-blend-mode: multiply;
    z-index: 1;
  }

  .app { position: relative; z-index: 2; min-height: 100vh; }

  /* ========== 顶栏 ========== */
  .topbar {
    position: sticky; top: 0;
    backdrop-filter: blur(20px) saturate(180%);
    background: rgba(245,240,230,.85);
    border-bottom: 1px solid var(--line);
    padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 50;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 17px;
    letter-spacing: .02em;
  }
  .brand-mark {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--accent);
    display: grid; place-items: center;
    color: var(--bg-paper);
    font-family: var(--font-display);
    font-weight: 900; font-size: 13px;
    box-shadow: 0 2px 8px rgba(14,140,109,.3);
  }
  .topbar-meta { font-size: 12px; color: var(--ink-3); letter-spacing: .08em; }

  /* ========== 通用按钮 ========== */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 32px;
    background: var(--ink);
    color: var(--bg-paper);
    border: none; border-radius: 999px;
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: 15px;
    cursor: pointer;
    transition: all .25s cubic-bezier(.4,0,.2,1);
    letter-spacing: .04em;
  }
  .btn:hover { background: var(--accent); transform: translateY(-1px); box-shadow: var(--shadow-2); }
  .btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }
  .btn-ghost {
    background: transparent;
    color: var(--ink-2);
    border: 1px solid var(--line-strong);
  }
  .btn-ghost:hover { background: var(--bg-paper); color: var(--ink); border-color: var(--ink); transform: none; }
  .btn-arrow::after { content: "→"; font-family: var(--font-display); }

  /* ========== 欢迎页 ========== */
  .welcome {
    max-width: 880px;
    margin: 0 auto;
    padding: 80px 28px 120px;
  }
  .welcome-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-display);
    font-size: 12px;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 28px;
  }
  .welcome-eyebrow::before {
    content: ""; width: 28px; height: 1px; background: var(--accent);
  }
  .welcome-title {
    font-family: var(--font-serif);
    font-weight: 900;
    font-size: clamp(40px, 7vw, 72px);
    line-height: 1.05;
    letter-spacing: -.02em;
    margin-bottom: 28px;
  }
  .welcome-title em {
    font-style: normal;
    color: var(--accent);
    font-family: var(--font-display);
    font-weight: 900;
  }
  .welcome-sub {
    font-size: 18px;
    color: var(--ink-2);
    max-width: 640px;
    margin-bottom: 56px;
    line-height: 1.8;
  }
  .welcome-meta {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    margin-bottom: 56px;
  }
  .welcome-meta-item {
    padding: 24px 24px 24px 0;
    border-right: 1px solid var(--line);
  }
  .welcome-meta-item:last-child { border-right: none; }
  .welcome-meta-num {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 36px;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 8px;
  }
  .welcome-meta-label {
    font-size: 13px; color: var(--ink-3); letter-spacing: .04em;
  }

  /* ========== 问题页 ========== */
  .quiz {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 28px 120px;
  }
  .progress {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 48px;
    font-family: var(--font-display);
    font-size: 13px;
    letter-spacing: .15em;
    color: var(--ink-3);
  }
  .progress-bar {
    flex: 1;
    height: 1px;
    background: var(--line);
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    position: absolute; inset: 0;
    background: var(--accent);
    transform-origin: left;
    transition: transform .5s cubic-bezier(.4,0,.2,1);
  }
  .q-number {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: .25em;
    color: var(--accent);
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  .q-title {
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: clamp(26px, 4vw, 36px);
    line-height: 1.35;
    margin-bottom: 12px;
    letter-spacing: -.01em;
  }
  .q-hint {
    font-size: 14px;
    color: var(--ink-3);
    margin-bottom: 36px;
    font-style: italic;
  }
  .q-options {
    display: flex; flex-direction: column; gap: 12px;
    margin-bottom: 48px;
  }
  .opt {
    display: block;
    cursor: pointer;
    background: var(--bg-paper);
    border: 1.5px solid var(--line);
    border-radius: 14px;
    padding: 20px 24px;
    transition: all .2s cubic-bezier(.4,0,.2,1);
    position: relative;
  }
  .opt:hover {
    border-color: var(--ink-3);
    transform: translateX(4px);
  }
  .opt input { position: absolute; opacity: 0; pointer-events: none; }
  .opt-inner {
    display: flex; align-items: flex-start; gap: 14px;
  }
  .opt-bullet {
    flex-shrink: 0;
    width: 22px; height: 22px;
    border: 1.5px solid var(--line-strong);
    border-radius: 50%;
    margin-top: 2px;
    transition: all .2s;
    display: grid; place-items: center;
  }
  .opt-bullet.checkbox { border-radius: 5px; }
  .opt-text {
    font-size: 15.5px;
    color: var(--ink);
    line-height: 1.6;
  }
  .opt-text strong {
    font-family: var(--font-serif);
    font-weight: 700;
    color: var(--accent);
    margin-right: 6px;
  }
  .opt.selected {
    background: var(--ink);
    border-color: var(--ink);
  }
  .opt.selected .opt-text { color: var(--bg-paper); }
  .opt.selected .opt-text strong { color: var(--gold); }
  .opt.selected .opt-bullet {
    border-color: var(--gold);
    background: var(--gold);
  }
  .opt.selected .opt-bullet::after {
    content: ""; width: 8px; height: 8px;
    background: var(--ink); border-radius: 50%;
  }
  .opt.selected .opt-bullet.checkbox::after { border-radius: 1px; }
  .q-nav { display: flex; justify-content: space-between; align-items: center; }

  /* "其他"选项的填空框 */
  .opt-input-wrap {
    margin: -2px 0 12px;
    padding: 0 2px;
    animation: fadeIn .3s cubic-bezier(.4,0,.2,1) both;
  }
  .opt-input {
    width: 100%;
    font-family: var(--font-sans);
    font-size: 15px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1.5px solid var(--accent);
    border-radius: 12px;
    color: var(--ink);
    outline: none;
    transition: box-shadow .2s;
  }
  .opt-input:focus { box-shadow: 0 0 0 4px rgba(14,140,109,.12); }
  .opt-input::placeholder { color: var(--ink-3); }
  .q-multi-hint {
    display: inline-block;
    font-size: 12px;
    color: var(--accent);
    background: rgba(14,140,109,.1);
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 24px;
    letter-spacing: .04em;
  }

  /* 数字输入题 */
  .q-number-wrap {
    position: relative;
    margin-bottom: 18px;
  }
  .q-number-input {
    display: block;
    width: 100%;
    font-family: var(--font-display), var(--font-serif);
    font-weight: 900;
    font-size: 64px;
    text-align: center;
    background: var(--bg-paper);
    border: 1.5px solid var(--line);
    border-radius: 16px;
    padding: 32px 24px 32px 24px;
    color: var(--ink);
    outline: none;
    transition: all .2s;
    letter-spacing: -.02em;
    -moz-appearance: textfield;
  }
  .q-number-input::-webkit-outer-spin-button,
  .q-number-input::-webkit-inner-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  .q-number-input:focus {
    border-color: var(--ink);
    background: var(--surface);
    box-shadow: 0 0 0 4px rgba(14,140,109,.12);
  }
  .q-number-input::placeholder {
    color: var(--line-strong);
    font-weight: 400;
    font-family: var(--font-sans);
    font-size: 28px;
  }
  .q-number-suffix {
    position: absolute;
    right: 36px;
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--font-serif);
    font-size: 22px;
    color: var(--ink-3);
    pointer-events: none;
  }

  /* ========== 加载页 ========== */
  .loading {
    min-height: calc(100vh - 60px);
    display: grid; place-items: center;
    padding: 28px;
  }
  .loading-inner { text-align: center; max-width: 520px; }
  .loading-mark {
    width: 80px; height: 80px;
    border: 2px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 32px;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-title {
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 28px;
    margin-bottom: 12px;
  }
  .loading-step {
    font-size: 14px;
    color: var(--ink-3);
    font-family: var(--font-display);
    letter-spacing: .1em;
    min-height: 22px;
  }

  /* ========== 报告页 ========== */
  .report {
    max-width: 820px;
    margin: 0 auto;
    padding: 56px 28px 120px;
  }
  .report-header {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 40px;
    margin-bottom: 56px;
    position: relative;
  }
  .report-tag {
    display: inline-block;
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .25em;
    color: var(--bg-paper);
    background: var(--accent);
    padding: 6px 14px;
    margin-bottom: 28px;
    text-transform: uppercase;
  }
  .persona-name {
    font-family: var(--font-serif);
    font-weight: 900;
    font-size: clamp(36px, 6vw, 56px);
    line-height: 1.1;
    letter-spacing: -.02em;
    margin-bottom: 20px;
  }
  .persona-subtitle {
    font-size: 17px;
    color: var(--ink-2);
    line-height: 1.7;
    font-family: var(--font-serif);
    font-style: italic;
  }
  .report-stats {
    display: flex; flex-wrap: wrap; gap: 24px 40px;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
  }
  .stat-item { display: flex; flex-direction: column; }
  .stat-label {
    font-size: 11px; letter-spacing: .15em;
    color: var(--ink-3);
    text-transform: uppercase;
    font-family: var(--font-display);
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 18px;
    color: var(--ink);
  }
  .stat-value.accent { color: var(--accent); }

  .section {
    margin-bottom: 64px;
    position: relative;
  }
  /* 一级标题：红色，醒目，主导视觉 */
  .section-num {
    font-family: var(--font-serif);
    font-weight: 900;
    font-size: clamp(28px, 4.2vw, 38px);
    line-height: 1.2;
    letter-spacing: -.008em;
    color: var(--accent);
    margin-bottom: 14px;
  }
  /* 二级标题：黑色，作为副标 */
  .section-title {
    font-family: var(--font-serif);
    font-weight: 600;
    font-size: 20px;
    line-height: 1.6;
    margin-bottom: 28px;
    letter-spacing: -.005em;
    color: var(--ink);
  }
  /* 卷首语：当前面诊的副标是核心论断，多一点视觉权重和分割线 */
  .section.is-headline .section-title {
    font-size: clamp(22px, 3vw, 28px);
    font-weight: 700;
    line-height: 1.55;
    padding-bottom: 24px;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--line);
  }
  .section p {
    margin-bottom: 16px;
    color: var(--ink-2);
    line-height: 1.85;
    font-size: 16px;
  }
  .section p:last-child { margin-bottom: 0; }
  .section strong, .section b {
    color: var(--ink);
    font-weight: 700;
  }
  .section .hl {
    background: linear-gradient(180deg, transparent 60%, rgba(240,205,90,.5) 60%);
    padding: 0 2px;
    color: var(--ink);
    font-weight: 500;
  }

  .callout {
    background: var(--bg-paper);
    border-left: 3px solid var(--accent);
    padding: 20px 24px;
    margin: 24px 0;
    border-radius: 0 8px 8px 0;
    font-style: italic;
    font-size: 15.5px;
    color: var(--ink-2);
    line-height: 1.7;
  }
  .callout strong { font-style: normal; }

  .path-block {
    background: #E5F2EB;
    color: var(--ink);
    padding: 32px 36px;
    border-radius: 16px;
    margin-bottom: 24px;
    border: 1px solid #C6E4D8;
    box-shadow: 0 2px 12px rgba(22,101,79,.07);
  }
  .path-block p {
    color: var(--ink);
    margin-bottom: 12px;
  }
  .path-block p:last-child { margin-bottom: 0; }
  .path-steps { font-size: 16px; line-height: 1.85; }

  .material-list {
    background: var(--bg-paper);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 28px 32px;
  }
  .material-prefix {
    font-size: 15px;
    color: var(--accent-dark);
    font-weight: 500;
    line-height: 1.85;
    margin-bottom: 28px;
    padding: 18px 22px;
    background: rgba(14,140,109,.08);
    border-left: 3px solid var(--accent);
    border-radius: 0 10px 10px 0;
  }
  .material-prefix strong { color: var(--accent-dark); font-weight: 700; }
  .material-group {
    margin-bottom: 18px;
  }
  .material-group:last-child { margin-bottom: 0; }
  .material-group-title {
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 15px;
    color: var(--accent);
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .material-group-title::before {
    content: ""; width: 6px; height: 6px;
    background: var(--accent); border-radius: 50%;
  }
  .material-items {
    font-size: 14.5px;
    color: var(--ink-2);
    line-height: 1.8;
    padding-left: 14px;
  }
  .material-items .item {
    display: inline-block;
    margin-right: 4px;
  }

  /* 资料区底部 CTA：有需要的可以找我领取 */
  .material-cta {
    margin-top: 32px;
    padding: 20px 24px;
    background: linear-gradient(135deg, rgba(14,140,109,.08), rgba(235,169,60,.07));
    border: 1px solid rgba(14,140,109,.2);
    border-radius: 12px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
  }
  .material-cta-text {
    font-size: 15px;
    color: var(--ink);
    line-height: 1.65;
    flex: 1;
    min-width: 180px;
  }
  .material-cta-text strong {
    color: var(--accent);
    font-weight: 700;
  }
  .material-cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 11px 22px;
    background: var(--accent);
    color: var(--bg-paper);
    border: none;
    border-radius: 999px;
    font-family: var(--font-sans);
    font-weight: 500;
    font-size: 14.5px;
    cursor: pointer;
    transition: all .25s cubic-bezier(.4,0,.2,1);
    white-space: nowrap;
    letter-spacing: .02em;
  }
  .material-cta-btn:hover {
    background: var(--accent-dark);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(14,140,109,.28);
  }

  .closing {
    background: linear-gradient(180deg, var(--bg-paper), #E5F1EB);
    border-radius: 16px;
    padding: 40px 36px;
    margin-top: 24px;
    border: 1px solid var(--line);
    position: relative;
  }
  .closing-quote {
    font-family: var(--font-display);
    font-size: 64px;
    color: var(--accent);
    line-height: 1;
    position: absolute;
    top: 16px; left: 24px;
    opacity: .15;
  }
  .closing p {
    color: var(--ink-2);
    font-size: 15.5px;
    line-height: 1.95;
  }

  .report-footer {
    margin-top: 64px;
    padding-top: 40px;
    border-top: 1px solid var(--line);
    text-align: center;
  }
  .report-footer .btn { margin: 0 6px 12px; }
  .report-footer-meta {
    font-size: 12px; color: var(--ink-3);
    margin-top: 24px;
    font-family: var(--font-display);
    letter-spacing: .1em;
  }

  /* 报告里特殊强调 */
  .keypoint {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 24px 30px;
    margin: 24px 0;
  }
  .keypoint-label {
    font-family: var(--font-display);
    font-size: 13px;
    letter-spacing: .2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
    font-weight: 700;
  }
  .keypoint-text {
    font-family: var(--font-serif);
    font-weight: 600;
    font-size: 19px;
    color: var(--ink);
    line-height: 1.7;
    letter-spacing: .005em;
  }

  /* 动画 */
  .fade-in {
    animation: fadeIn .5s cubic-bezier(.4,0,.2,1) both;
  }
  .stagger-1 { animation-delay: .05s; }
  .stagger-2 { animation-delay: .12s; }
  .stagger-3 { animation-delay: .2s; }
  .stagger-4 { animation-delay: .28s; }
  .stagger-5 { animation-delay: .36s; }
  .stagger-6 { animation-delay: .44s; }
  .stagger-7 { animation-delay: .52s; }
  .stagger-8 { animation-delay: .6s; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* 响应式 */
  @media (max-width: 640px) {
    .topbar { padding: 12px 18px; }
    .welcome { padding: 48px 20px 80px; }
    .quiz, .report { padding-left: 20px; padding-right: 20px; }
    .opt { padding: 16px 18px; }
    .opt-text { font-size: 14.5px; }

const state = {
  page: 'welcome',
  qIndex: 0,
  answers: {
    Q1: null, Q2: null, Q3: null,
    Q4_1: null, Q4_grade: null, Q4_grade_other: null, Q4_2: null,
    Q5: [], Q6: [], Q7: [],
    Q8: null,
    Q9: []
  }
};

const TARGET_LABEL = { 'pass': '过线 425 分', 'mid': '500–550+', 'high': '600+' };
const GRADE_LABEL = { 'g1': '准大一', 'g2': '大二', 'g3': '大三', 'g4': '大四', 'other': '其他' };
function gradeDisplay(a) {
  if (a.Q4_grade === 'other') return a.Q4_grade_other || '其他';
  return GRADE_LABEL[a.Q4_grade] || '—';
}

function computeTags(a) {
  const exam = a.Q1 === 'cet4' ? '四级' : '六级';
  // 时间档由精确天数自动推导
  const days = a.Q3;
  let time;
  if (days < 45) time = '极限抢分';
  else if (days <= 90) time = '中周期';
  else time = '长线';
  let base, baseFromQ42 = true;
  if (a.Q4_2 && a.Q4_2 !== 'none') {
    base = { 'lt380':'D1','380_425':'D2','425_500':'D3','gt500':'D4' }[a.Q4_2];
  } else {
    baseFromQ42 = false;
    base = { 'lt90':'D1','90_115':'D2','115_135':'D3','gt135':'D4' }[a.Q4_1] || 'D2';
  }

  // 听力根因
  let listening;
  const Q5 = a.Q5, Q6 = a.Q6;
  if (Q6.includes('ymmq') || Q6.includes('zsfy') || Q5.includes('jmth')) listening = '发音未建立';
  else if (Q6.includes('dcnl')) listening = '辨音弱';
  else if (Q5.includes('fyj') || Q5.includes('bmbx')) listening = '处理慢';
  else listening = '已较好';

  // 阅读短板
  let reading;
  const Q7 = a.Q7;
  if (Q7.includes('hmq') || Q7.includes('qxkb')) reading = '词汇型';
  else if (Q7.includes('gsfy')) reading = '速度型';
  else if (Q7.includes('dwpc')) reading = '技巧型';
  else reading = '已较好';

  // 写作
  const writing = { 'dnkb':'空白','chinglish':'中式','mb':'模板依赖','ideal':'已较好' }[a.Q8] || '中式';

  // 方法
  let method;
  const Q9 = a.Q9;
  if (Q9.includes('none')) method = '未起步';
  else if (Q9.includes('sp')) method = '碎片型';
  else if (Q9.includes('st') || Q9.includes('bdc')) method = '刷题型';
  else if (Q9.includes('xt')) method = '系统型';
  else method = '刷题型';

  return { exam, time, base, baseFromQ42, listening, reading, writing, method };
}

function buildSubtitle(tags, a) {
  // 片段 A
  let A;
  if (tags.listening !== '已较好') {
    A = SUBA[tags.listening];
  } else if (tags.reading === '词汇型') {
    A = SUBA['阅读=词汇型'];
  } else if (tags.reading === '速度型') {
    A = SUBA['阅读=速度型'];
  } else {
    A = SUBA['听力已较好'];
  }
  // 片段 B
  const B = SUBB[tags.method];
  // 片段 C
  const days = a.Q3;
  let C;
  const weak = (tags.base === 'D1' || tags.base === 'D2');
  if (weak && (tags.time === '中周期' || tags.time === '长线')) {
    C = `还有 ${days} 天，可以好好准备`;
  } else if (tags.time === '极限抢分') {
    C = `只剩 ${days} 天，要抢分`;
  } else if (a.Q2 === 'mid' || a.Q2 === 'high') {
    C = `离 ${TARGET_LABEL[a.Q2]} 就差临门一脚`;
  } else {
    C = `还有 ${days} 天，方法对效率和结果会更好`;
  }
  return { A, B, C };
}

function buildDiagnosis(tags, a) {
  const timeDesc = TIME_DESC[tags.time];
  const baseDesc = tags.baseFromQ42 ? BASE_DESC[tags.base].with : BASE_DESC[tags.base].without;
  const verdict = BASE_VERDICT[tags.base];
  const exam = tags.exam;

  const locate = `你考的是${exam}，${timeDesc}，${baseDesc}——${verdict}。`;
  const scan = GLOBAL_SCAN[exam];
  const tone = TIME_TONE[tags.time];
  const strategy = BASE_STRATEGY[tags.base];
  return { locate, scan, tone, strategy, close: CLOSE_LINE };
}

const view = () => document.getElementById('view');

function render() {
  if (state.page === 'welcome') return renderWelcome();
  if (state.page === 'quiz')    return renderQuiz();
  if (state.page === 'loading') return renderLoading();
  if (state.page === 'report')  return renderReport();
}

function renderWelcome() {
  view().innerHTML = `
    <section class="welcome">
      <div class="welcome-eyebrow fade-in stagger-1">几道选择题 · 约 2 分钟 · 个性化诊断报告</div>
      <h1 class="welcome-title fade-in stagger-2">
        不是再一次刷题，<br/>
        是一次<em>诚实</em>的<br/>
        英语能力体检。
      </h1>
      <p class="welcome-sub fade-in stagger-3">
        你以为是单词没背够，其实是发音体系没建立；

      </p>

    </section>
  `;

function renderQuiz() {
  const q = QUESTIONS[state.qIndex];
  const total = QUESTIONS.length;
  const pct = ((state.qIndex) / total) * 100;
  const isMulti  = q.type === 'multi';
  const isNumber = q.type === 'number';
  const answered = isAnswered(q);

  view().innerHTML = `
    <section class="quiz">
      <div class="progress fade-in">
        <span>Q ${String(state.qIndex+1).padStart(2,'0')} / ${String(total).padStart(2,'0')}</span>
        <div class="progress-bar"><div class="progress-fill" style="transform: scaleX(${pct/100})"></div></div>
      </div>
      <div class="q-number fade-in stagger-1">Question ${state.qIndex+1}</div>
      <h2 class="q-title fade-in stagger-2">${q.title}</h2>
      ${isMulti ? '<div class="q-multi-hint fade-in stagger-2">' + (q.hint || '可多选') + '</div>' : ''}
      ${isNumber ? renderNumberInput(q) : `
        <div class="q-options fade-in stagger-3">
          ${q.options.map((opt, i) => renderOption(q, opt, i)).join('')}
        </div>
      `}
      <div class="q-nav fade-in stagger-4">
        <button class="btn btn-ghost" ${state.qIndex===0?'disabled':''} onclick="prevQ()">← 上一题</button>
        <button class="btn btn-arrow" ${answered?'':'disabled'} onclick="nextQ()">
          ${state.qIndex===total-1 ? '生成报告' : '下一题'}
        </button>
      </div>
    </section>
  `;
  // 数字题：自动聚焦
  if (isNumber) {
    const inp = document.querySelector('.q-number-input');
    if (inp) inp.focus();
  }
}

function renderNumberInput(q) {
  const v = state.answers[q.id];
  return `
    <div class="fade-in stagger-3">
      <div class="q-number-wrap">
        <input type="number" class="q-number-input"
          min="${q.min||1}" max="${q.max||365}"
          placeholder="${q.placeholder||''}"
          value="${v != null ? v : ''}"
          oninput="setNumber('${q.id}', this.value)"
          onkeydown="if(event.key==='Enter'){event.preventDefault();const b=document.querySelector('.q-nav .btn-arrow');if(b&&!b.disabled)b.click();}" />
        <span class="q-number-suffix">天</span>
      </div>
    </div>
  `;
}

function setNumber(qid, value) {
  const n = parseInt(value, 10);
  state.answers[qid] = (isNaN(n) || n <= 0) ? null : Math.min(n, 365);
  // 局部更新按钮可用性，避免重渲染丢焦点
  const btn = document.querySelector('.q-nav .btn-arrow');
  if (btn) {
    if (state.answers[qid] && state.answers[qid] > 0) btn.removeAttribute('disabled');
    else btn.setAttribute('disabled', '');
  }
}

function renderOption(q, opt, i) {
  const isMulti = q.type === 'multi';
  const sel = isMulti ? state.answers[q.id].includes(opt.id) : state.answers[q.id] === opt.id;
  const bulletClass = isMulti ? 'opt-bullet checkbox' : 'opt-bullet';
  const desc = opt.desc ? ` <span style="color:var(--ink-3);">— ${opt.desc}</span>` : '';
  let inputHtml = '';
  if (opt.withInput) {
    const v = (state.answers[q.id + '_other'] || '').replace(/"/g, '&quot;');
    inputHtml = `
      <div class="opt-input-wrap" id="optInputWrap" style="display:${sel ? 'block' : 'none'}">
        <input type="text" class="opt-input" maxlength="40"
          placeholder="${opt.inputPlaceholder || '请填写'}"
          value="${v}"
          oninput="setOtherText('${q.id}', this.value)" />
      </div>
    `;
  }
  return `
    <label class="opt ${sel?'selected':''}" data-opt-id="${opt.id}" onclick="pick('${q.id}','${opt.id}',${isMulti},${opt.exclusive===true})">
      <div class="opt-inner">
        <div class="${bulletClass}"></div>
        <div class="opt-text"><strong>${String.fromCharCode(65+i)}</strong>${opt.label}${desc}</div>
      </div>
    </label>
    ${inputHtml}
  `;
}

function setOtherText(qid, value) {
  state.answers[qid + '_other'] = value.trim() ? value : null;
  // 实时联动"下一题"按钮：选了"其他"必须填写才能继续
  const q = QUESTIONS.find(x => x.id === qid);
  const btn = document.querySelector('.q-nav .btn-arrow');
  if (btn) {
    if (isAnswered(q)) btn.removeAttribute('disabled');
    else btn.setAttribute('disabled', '');
  }
}

// 统一的"本题是否已作答"判断（含"其他"必填校验）
function isAnswered(q) {
  const ans = state.answers[q.id];
  const isMulti  = q.type === 'multi';
  const isNumber = q.type === 'number';
  let base;
  if (isMulti)       base = ans.length > 0;
  else if (isNumber) base = typeof ans === 'number' && ans > 0;
  else               base = ans !== null;
  if (!base) return false;
  // 若选中了带填空的选项（如"其他"），则必须填写内容
  const inputOpt = q.options && q.options.find(o => o.withInput);
  if (inputOpt) {
    const selected = isMulti ? ans.includes(inputOpt.id) : ans === inputOpt.id;
    const txt = state.answers[q.id + '_other'];
    if (selected && !(txt && txt.trim())) return false;
  }
  return true;
}

function pick(qid, optId, isMulti, exclusive) {
  if (!isMulti) {
    state.answers[qid] = optId;
  } else {
    const arr = state.answers[qid];
    if (exclusive) {
      // 选了互斥项，清空其它
      state.answers[qid] = arr.includes(optId) ? [] : [optId];
    } else {
      // 如果当前已有互斥项，先清空
      const q = QUESTIONS.find(x => x.id === qid);
      const hasExcl = arr.some(id => {
        const o = q.options.find(o2 => o2.id === id);
        return o && o.exclusive;
      });
      if (hasExcl) state.answers[qid] = [];
      const idx = state.answers[qid].indexOf(optId);
      if (idx === -1) state.answers[qid].push(optId);
      else state.answers[qid].splice(idx, 1);
    }
  }
  updateSelections(qid);
}

// 局部更新选项的高亮 & 下一题按钮的可用性，避免整页重渲染造成的闪屏
function updateSelections(qid) {
  const q = QUESTIONS.find(x => x.id === qid);
  const isMulti = q.type === 'multi';
  const ans = state.answers[qid];
  document.querySelectorAll('.opt').forEach(el => {
    const optId = el.dataset.optId;
    const selected = isMulti ? ans.includes(optId) : ans === optId;
    el.classList.toggle('selected', selected);
  });
  // "其他"填空框的显隐
  const inputOpt = q.options && q.options.find(o => o.withInput);
  if (inputOpt) {
    const wrap = document.getElementById('optInputWrap');
    if (wrap) {
      const show = isMulti ? ans.includes(inputOpt.id) : ans === inputOpt.id;
      wrap.style.display = show ? 'block' : 'none';
      if (show) {
        const inp = wrap.querySelector('input');
        if (inp) inp.focus();
      } else {
        state.answers[qid + '_other'] = null; // 取消选其他时清空填空
      }
    }
  }
  const btn = document.querySelector('.q-nav .btn-arrow');
  if (btn) {
    if (isAnswered(q)) btn.removeAttribute('disabled');
    else btn.setAttribute('disabled', '');
  }
}

function startQuiz() {
  state.page = 'quiz';
  state.qIndex = 0;
  render();
}
function prevQ() {
  if (state.qIndex > 0) { state.qIndex--; renderQuiz(); }
}
function nextQ() {
  if (state.qIndex < QUESTIONS.length - 1) {
    state.qIndex++;
    renderQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    state.page = 'loading';
    renderLoading();
    setTimeout(() => {
      state.page = 'report';
      renderReport();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }, 1800);
  }
}

    el.style.opacity = 0;

}

// ① 微信链接（最推荐，点了直接拉起微信开始对话）
//    可用「微信客服链接」如 https://work.weixin.qq.com/kfid/kfcxxxxxxx
//    或「公众号/视频号/个人名片」分享链接
const WECHAT_URL = '';
// ② 微信二维码图片（没有链接就用这个，点了弹窗显示二维码让学生扫码加）
//    把二维码图片和 index.html 放同一目录，这里填文件名，如 'wechat-qr.png'
const WECHAT_QR  = '';
// ③ 微信号（实在没有上面两个，就填微信号，点了自动复制并提示去微信添加）
const WECHAT_ID  = '';

function contactTeacher() {
  if (WECHAT_URL) { window.location.href = WECHAT_URL; return; }
  if (WECHAT_QR)  { showWechatQR(WECHAT_QR); return; }
  if (WECHAT_ID) {
    const tip = '老师微信号：' + WECHAT_ID + '\n请打开微信 →「添加朋友」→ 粘贴搜索添加';
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(WECHAT_ID).then(
        () => alert('已复制老师微信号：' + WECHAT_ID + '\n打开微信「添加朋友」粘贴即可'),
        () => alert(tip)
      );
    } else { alert(tip); }
    return;
  }
  alert('还没配置联系方式。\n请在 index.html 顶部填写 WECHAT_URL / WECHAT_QR / WECHAT_ID 任一项。');
}

function showWechatQR(src) {
  let modal = document.getElementById('wechatModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'wechatModal';
    modal.className = 'wechat-modal';
    modal.innerHTML =
      '<div class="wechat-modal-card">' +
        '<button class="wechat-modal-close" aria-label="关闭" onclick="closeWechatQR()">×</button>' +
        '<div class="wechat-modal-title">扫码加老师微信</div>' +
        '<img src="' + src + '" alt="老师微信二维码" class="wechat-modal-qr" />' +
        '<div class="wechat-modal-hint">长按图片保存，或用微信「扫一扫」</div>' +
      '</div>';
    modal.onclick = (e) => { if (e.target === modal) closeWechatQR(); };
    document.body.appendChild(modal);
  }
  modal.style.display = 'flex';
}
function closeWechatQR() {
  const m = document.getElementById('wechatModal');
  if (m) m.style.display = 'none';
}

function restart() {
  state.page = 'welcome';
  state.qIndex = 0;
  Object.keys(state.answers).forEach(k => {
    state.answers[k] = Array.isArray(state.answers[k]) ? [] : null;
  });

}

<script>
const BIN_CONFIG = {
  apiKey: "$2a$10$Vf9CxUWuIQLpCeH1UqmjEuf.c3d6sTsNSwXLBqHarGiEd5/lT1bKq",
  binId: "6a3267c9da38895dfecf1c3f",
  baseUrl: "https://api.jsonbin.io/v3/b"
};
const LOCAL_STORAGE_KEY = "cet_assessment_submissions";
let lastSubmissionKey = null;
function readLocalSubmissions() {
  try {
    const raw = localStorage.getItem(LOCAL_STORAGE_KEY);
    const data = raw ? JSON.parse(raw) : [];
    return Array.isArray(data) ? data : [];
  } catch (err) {
    console.error("readLocalSubmissions", err);
    return [];
  }
}
function writeLocalSubmissions(rows) {
  try {
    localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(rows));
  } catch (err) {
    console.error("writeLocalSubmissions", err);
  }
}
function buildSubmissionPayload() {
  return {
    submittedAt: new Date().toISOString(),
    Q1: state.answers.Q1,
    Q2: state.answers.Q2,
    Q3: state.answers.Q3,
    Q4_1: state.answers.Q4_1,
    Q4_grade: state.answers.Q4_grade,
    Q4_grade_other: state.answers.Q4_grade_other,
    Q4_2: state.answers.Q4_2,
    Q5: Array.isArray(state.answers.Q5) ? [...state.answers.Q5] : [],
    Q6: Array.isArray(state.answers.Q6) ? [...state.answers.Q6] : [],
    Q7: Array.isArray(state.answers.Q7) ? [...state.answers.Q7] : [],
    Q8: state.answers.Q8,
    Q9: Array.isArray(state.answers.Q9) ? [...state.answers.Q9] : []
  };
}
async function fetchBinDataset() {
  const resp = await fetch(`${BIN_CONFIG.baseUrl}/${BIN_CONFIG.binId}/latest`, {
    method: 'GET',
    headers: { 'X-Master-Key': BIN_CONFIG.apiKey, 'X-Bin-Meta': 'false' }
  });
  if (!resp.ok) throw new Error(`Read failed: ${resp.status}`);
  const data = await resp.json();
  return data && typeof data === 'object' ? data : {};
}
async function saveCurrentSubmission() {
  const payload = buildSubmissionPayload();
  const submissionKey = JSON.stringify(payload);
  if (submissionKey === lastSubmissionKey) return;
  lastSubmissionKey = submissionKey;
  const localRows = readLocalSubmissions();
  localRows.push(payload);
  writeLocalSubmissions(localRows);
  try {
    const current = await fetchBinDataset();
    const submissions = Array.isArray(current.submissions) ? current.submissions.slice() : [];
    submissions.push(payload);
    const resp = await fetch(`${BIN_CONFIG.baseUrl}/${BIN_CONFIG.binId}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': BIN_CONFIG.apiKey,
        'X-Bin-Name': 'cet-assessment-dataset'
      },
      body: JSON.stringify({ version: 1, title: 'cet-assessment-dataset', updatedAt: new Date().toISOString(), submissions })
    });
    if (!resp.ok) throw new Error(`Write failed: ${resp.status}`);
  } catch (err) {
    console.error('saveCurrentSubmission', err);
  }
}
const codexOriginalRenderReport = renderReport;
renderReport = function() { codexOriginalRenderReport(); saveCurrentSubmission(); };
const codexOriginalRestart = restart;
restart = function() { lastSubmissionKey = null; codexOriginalRestart(); };
</script>
